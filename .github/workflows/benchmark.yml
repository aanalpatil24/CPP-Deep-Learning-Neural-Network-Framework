name: Performance Regression

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual triggering

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Run AVX-512 GEMM Benchmark
      run: |
        g++ -std=c++20 -O3 -march=native -ffast-math -mavx512f -mavx512dq -I./include benchmarks/bench_gemm.cpp -o bench_gemm
        ./bench_gemm