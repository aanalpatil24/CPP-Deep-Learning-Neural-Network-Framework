name: Nexus CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up GCC
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential gcc-11 g++-11

    - name: Build and Test Base Engine
      working-directory: ./Cpp_Neural_Network_Base
      run: |
        chmod +x scripts/build.sh
        ./scripts/build.sh

    - name: Build and Test Optimized Engine
      working-directory: ./Cpp_Neural_Network_Main
      run: |
        # Note: This might still fail on GitHub due to lack of AVX-512 hardware, 
        # but this command will at least find the file!
        chmod +x scripts/build.sh
        ./scripts/build.sh
